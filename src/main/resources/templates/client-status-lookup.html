<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Check Queue Status</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f4f7fb, #eaf1ff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1f2937;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
      padding: 32px 28px;
    }

    .title {
      margin: 0 0 8px;
      font-size: 36px;
      font-weight: 800;
      color: #111827;
      text-align: center;
    }

    .subtitle {
      margin: 0 0 28px;
      text-align: center;
      color: #6b7280;
      font-size: 15px;
      line-height: 1.5;
    }

    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      padding: 14px 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 14px;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
      font-weight: 700;
      color: #111827;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      transition: 0.2s ease;
      background: #fff;
    }

    input[type="text"]:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }

    .hint {
      margin-top: 6px;
      font-size: 13px;
      color: #6b7280;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: white;
      font-size: 17px;
      font-weight: 700;
      padding: 15px;
      cursor: pointer;
      transition: 0.2s ease;
      margin-top: 8px;
    }

    button:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    .footer-note {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: #6b7280;
      line-height: 1.5;
    }

    .back-link {
      display: inline-block;
      margin-top: 16px;
      text-align: center;
      width: 100%;
      color: #2563eb;
      text-decoration: none;
      font-weight: 700;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .card {
        padding: 24px 18px;
      }

      .title {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1 class="title">Check Your Queue Status</h1>
    <p class="subtitle">
      Enter your queue number and last name to view your live queue progress.
    </p>

    <div th:if="${error}" class="error" th:text="${error}"></div>

    <form method="post" th:action="@{/status}">
      <input type="hidden"
             th:name="${_csrf.parameterName}"
             th:value="${_csrf.token}" />

      <div class="form-group">
        <label for="queueNo">Queue Number</label>
        <input type="text" id="queueNo" name="queueNo" placeholder="Example: A001" required />
        <div class="hint">Use the queue number given after registration.</div>
      </div>

      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" name="lastName" placeholder="Enter your last name" required />
        <div class="hint">This helps confirm the correct ticket.</div>
      </div>

      <button type="submit">Check Status</button>
    </form>

    <div class="footer-note">
      Please make sure your queue number and last name are entered correctly.
    </div>

  <!--    <a href="/client" class="back-link">Want to get a queue number first?</a> -->
  </div>

</body>
</html>
